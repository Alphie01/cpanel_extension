# Optional local stack for developing the cpanel-whm-manager extension.
# Brings up Postgres + the extension's standalone server. NOT used by the
# platform (which mounts the in-process router); for local iteration only.
# No ports are exposed publicly by default — the app binds to the internal network.
services:
  cpanel-whm-manager-db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ext
      POSTGRES_PASSWORD: ext
      POSTGRES_DB: relation_ext
    networks:
      - ext-internal
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ext -d relation_ext']
      interval: 10s
      timeout: 5s
      retries: 5

  cpanel-whm-manager-worker:
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      DATABASE_URL: postgresql://ext:ext@cpanel-whm-manager-db:5432/relation_ext?schema=public
      EXT_HOSTING_ENCRYPTION_KEY: ${EXT_HOSTING_ENCRYPTION_KEY}
      EXT_HOSTING_TENANT_CONTEXT_MODE: header
      EXT_PLATFORM_JWT_SECRET: ${EXT_PLATFORM_JWT_SECRET}
    depends_on:
      cpanel-whm-manager-db:
        condition: service_healthy
    networks:
      - ext-internal
    # Expose only to the internal extension network; the platform gateway proxies in.
    expose:
      - '11000'

networks:
  ext-internal:
    driver: bridge
